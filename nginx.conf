upstream stock-market {
    server app1:8080 max_fails=2 fail_timeout=10s;
    server app2:8080 max_fails=2 fail_timeout=10s;
    server app3:8080 max_fails=2 fail_timeout=10s;

    keepalive 32;
}

server {
    listen 80;

    location = /health {
        access_log  off;
        proxy_pass  http://stock-market/actuator/health/readiness;
        proxy_next_upstream error timeout http_503;
    }

    location / {
        proxy_pass              http://stock-market;
        proxy_http_version      1.1;
        proxy_set_header        Connection        "";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_next_upstream     error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        proxy_read_timeout      10s;
        proxy_connect_timeout   1s;
    }
}