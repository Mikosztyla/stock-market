global:
  scrape_interval: 10s

scrape_configs:

  - job_name: stock-market-app1
    static_configs:
      - targets: ['app1:8080']
        labels:
          instance: app1
    metrics_path: /actuator/prometheus

  - job_name: stock-market-app2
    static_configs:
      - targets: ['app2:8080']
        labels:
          instance: app2
    metrics_path: /actuator/prometheus

  - job_name: stock-market-app3
    static_configs:
      - targets: ['app3:8080']
        labels:
          instance: app3
    metrics_path: /actuator/prometheus