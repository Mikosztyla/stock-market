spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:stockmarket;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:1.0}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

spring.application.name=${APP_INSTANCE_NAME:stock-market}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.info.title=Stock Market API
springdoc.info.description=Simplified stock market simulation
springdoc.info.version=1.0.0
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=3000
