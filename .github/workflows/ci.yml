name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       stockmarket
          POSTGRES_USER:     stockmarket
          POSTGRES_PASSWORD: stockmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/stockmarket
          SPRING_DATASOURCE_USERNAME: stockmarket
          SPRING_DATASOURCE_PASSWORD: stockmarket
          SPRING_PROFILES_ACTIVE:     int
        run: ./mvnw verify

      - name: Load Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        uses: simple-ql/allure-report-with-history@v1
        if: always()
        with:
          allure-results: target/allure-results
          allure-history: gh-pages/allure-history
          keep-reports: 20

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history