name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       stockmarket
          POSTGRES_USER:     stockmarket
          POSTGRES_PASSWORD: stockmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/stockmarket
          SPRING_DATASOURCE_USERNAME: stockmarket
          SPRING_DATASOURCE_PASSWORD: stockmarket
          SPRING_PROFILES_ACTIVE:     int
        run: ./mvnw verify

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/